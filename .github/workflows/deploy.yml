name: Deploy Message Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Copy app to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ec2-user"
          key: ${{ secrets.EC2_SSH_KEY }}
          # Now that they are in the root, we only go one level deep
          source: "message_server/app.py,message_server/Dockerfile,message_server/requirements.txt"
          target: "~/message-server"
          strip_components: 1
          overwrite: true

      - name: Build and run on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: "ec2-user"
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/message-server
            
            # Build the new image
            docker build --pull -t message-server:latest .
            
            # Stop and remove old container if it exists
            docker stop message-server || true
            docker rm message-server || true
            
            # Run the new container
            docker run -d \
              --name message-server \
              --restart unless-stopped \
              -p 5002:5002 \
              -e APP_ENV=PRODUCTION \
              -e POSTGRES_USER='${{ secrets.POSTGRES_USER }}' \
              -e POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
              -e POSTGRES_HOST='${{ secrets.POSTGRES_HOST }}' \
              -e POSTGRES_DB='postgres' \
              message-server:latest
            
            # Clean up old images to save space
            docker image prune -f
